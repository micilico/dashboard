[Service]
ExecStart=
# Replace the full command below with the exact current mount command,
# then keep the rc flags appended at the end.
ExecStart=/usr/bin/rclone mount REMOTE_NAME:REMOTE_PATH /mnt/ultra-media --config /home/debian/.config/rclone/rclone.conf --allow-other --dir-cache-time 72h --vfs-cache-mode full --rc --rc-addr 127.0.0.1:5572 --rc-no-auth
