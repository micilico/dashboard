dashboard.example.com {
  encode zstd gzip
  header {
    Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    X-Content-Type-Options "nosniff"
    Referrer-Policy "strict-origin-when-cross-origin"
    Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    -X-Dashboard-Internal-Auth
  }

  basic_auth {
    # Generate the hash with: caddy hash-password --plaintext 'your-password'
    admin $2a$14$replace-with-caddy-hash
  }

  redir /torrent-panel /torrent-panel/ 308
  redir /prowlarr-panel /prowlarr-panel/ 308

  handle /torrent-panel/* {
    reverse_proxy 127.0.0.1:3110 {
      header_up -X-Dashboard-Internal-Auth
      header_up X-Dashboard-Internal-Auth {env.TORRENT_PANEL_INTERNAL_AUTH_SECRET}
    }
  }

  handle /prowlarr-panel/* {
    reverse_proxy 127.0.0.1:3120 {
      header_up -X-Dashboard-Internal-Auth
      header_up X-Dashboard-Internal-Auth {env.PROWLARR_PANEL_INTERNAL_AUTH_SECRET}
    }
  }

  reverse_proxy 127.0.0.1:3001
}
