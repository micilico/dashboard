services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./homepage:/app/config
      - /mnt/ultra-media:/mnt/ultra-media:ro
      - /sys:/sys:ro

  torrent-panel:
    build: ./torrent-panel
    container_name: torrent-panel
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: ./torrent-panel/.env
        required: false
    environment:
      TORRENT_PANEL_HOST: 127.0.0.1
      TORRENT_PANEL_PORT: ${TORRENT_PANEL_PORT:-3110}
