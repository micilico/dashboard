services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.1
    container_name: homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ./.env
        required: false
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - ./homepage:/app/config
      - /mnt/ultra-media:/mnt/ultra-media:ro
      - /sys:/sys:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  torrent-panel:
    build:
      context: .
      dockerfile: ./torrent-panel/Dockerfile
    container_name: torrent-panel
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - path: ./torrent-panel/.env
        required: false
    environment:
      TORRENT_PANEL_HOST: 127.0.0.1
      TORRENT_PANEL_PORT: ${TORRENT_PANEL_PORT:-3110}
      TORRENT_PANEL_MEDIA_AUTOMATION_STATE_PATH: /app/data/media-automation-state.json
      TORRENT_PANEL_NOTIFICATION_STATE_PATH: /app/data/notification-state.json
      TORRENT_PANEL_AUTOMATION_RULES_STATE_PATH: /app/data/automation-rules.json
    volumes:
      - torrent-panel-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3110/healthz', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  prowlarr-panel:
    build:
      context: .
      dockerfile: ./prowlarr-panel/Dockerfile
    container_name: prowlarr-panel
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - path: ./prowlarr-panel/.env
        required: false
    environment:
      PROWLARR_PANEL_HOST: 127.0.0.1
      PROWLARR_PANEL_PORT: ${PROWLARR_PANEL_PORT:-3120}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3120/healthz', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  cloud-panel:
    build:
      context: .
      dockerfile: ./cloud-panel/Dockerfile
    container_name: cloud-panel
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - path: ./cloud-panel/.env
        required: false
    environment:
      CLOUD_PANEL_HOST: 127.0.0.1
      CLOUD_PANEL_PORT: ${CLOUD_PANEL_PORT:-3130}
      CLOUD_PANEL_MOUNT_PATH: /mnt/ultra-media
    volumes:
      - /mnt/ultra-media:/mnt/ultra-media:rw
      - cloud-panel-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3130/healthz', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  torrent-panel-data:
  cloud-panel-data:
