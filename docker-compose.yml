services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./homepage:/app/config
      - /mnt/ultra-media:/mnt/ultra-media:ro
      - /sys:/sys:ro

  torrent-panel:
    build: ./torrent-panel
    container_name: torrent-panel
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TORRENT_PANEL_PORT:-3110}:${TORRENT_PANEL_PORT:-3110}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ./torrent-panel/.env
        required: false
    environment:
      TORRENT_PANEL_HOST: 0.0.0.0
      TORRENT_PANEL_PORT: ${TORRENT_PANEL_PORT:-3110}
